spring.application.name=BackendGondorChic

# PostgreSQL connection (adjust credentials locally)
spring.datasource.url=jdbc:postgresql://localhost:5432/gondor_chic
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema managed by SQL scripts already present in /database
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Prevent Spring from auto-loading a different seed dataset
spring.sql.init.mode=never

server.port=8080

# JWT configuration
app.jwt.secret=ChangeThisSecretKeyToALongRandomStringAtLeast32Chars
app.jwt.expiration-ms=86400000
